<!DOCTYPE html>
<html lang="es">
<head>
<link rel="manifest" href="/static/manifest.json">

<meta charset="UTF-8">

<title>Gestor de Gastos</title>

<div class="grid grid-cols-3 gap-4 mb-6">

<div class="bg-gray-50 p-4 rounded-lg text-center">
<p class="text-gray-500">Total gastado</p>
<p class="text-xl font-bold">¥{{ total }}</p>
</div>

<div class="bg-gray-50 p-4 rounded-lg text-center">
<p class="text-gray-500">Número de gastos</p>
<p class="text-xl font-bold">{{ cantidad_gastos }}</p>
</div>

<div class="bg-gray-50 p-4 rounded-lg text-center">
<p class="text-gray-500">Categoría principal</p>
<p class="text-xl font-bold">{{ categoria_top }}</p>
</div>

</div>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-xl p-8 w-full max-w-2xl">

<h1 class="text-3xl font-bold mb-6 text-center">
💰 Gestor de Gastos
</h1>

<form action="/agregar" method="post" class="flex gap-3 mb-6">

<input
type="number"
name="monto"
placeholder="Monto"
required
class="border rounded-lg p-2 w-1/3"
/>

<input
type="text"
name="categoria"
placeholder="Categoría"
required
class="border rounded-lg p-2 w-1/3"
/>

<button
type="submit"
class="bg-blue-500 text-white px-4 rounded-lg hover:bg-blue-600"
>
Agregar
</button>

</form>

<h2 class="text-xl font-semibold mb-3">Lista de gastos</h2>

<ul class="space-y-2 mb-6">

{% for gasto in gastos %}

<li class="flex justify-between items-center bg-gray-50 p-2 rounded">

<span>
{{ gasto[1] }} ¥ - {{ gasto[2] }}
</span>

<form action="/eliminar/{{ gasto[0] }}" method="post">

<button
class="text-red-500 hover:text-red-700"
type="submit"
>
Eliminar
</button>

</form>

</li>

{% endfor %}

</ul>

<h2 class="text-xl font-semibold mb-3">Distribución de gastos</h2>

<canvas id="graficoGastos"></canvas>

</div>

<script>

const categorias = JSON.parse('{{ categorias | tojson | safe }}')

const labels = Object.keys(categorias)
const data = Object.values(categorias)

const ctx = document.getElementById('graficoGastos')

new Chart(ctx, {
type: 'pie',
data: {
labels: labels,
datasets: [{
label: 'Gastos',
data: data
}]
}
})

</script>

</body>
</html>
